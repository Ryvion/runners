name: Build Runner Images

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build ${{ matrix.runner }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        runner: [llm-runner, embed-runner, transcode-runner]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for Dockerfile
        id: check
        env:
          RUNNER_NAME: ${{ matrix.runner }}
        run: |
          if [ -f "${RUNNER_NAME}/Dockerfile" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No Dockerfile for ${RUNNER_NAME}"
          fi

      - name: Lowercase image name
        if: steps.check.outputs.exists == 'true'
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}/${{ matrix.runner }}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        if: steps.check.outputs.exists == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.runner }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}

  go-lint:
    name: Lint Go runners
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
      - name: Vet embed-runner
        run: cd embed-runner && go vet ./...
      - name: Vet transcode-runner
        run: cd transcode-runner && go vet ./...
