name: Build Runner Images

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: embed-runner
            context: ./embed-runner
            dockerfile: ./embed-runner/Dockerfile
            image: ghcr.io/ryvion/embed-runner
            compatibility_tag: 0.1.0
          - name: transcode-runner
            context: ./transcode-runner
            dockerfile: ./transcode-runner/Dockerfile
            image: ghcr.io/ryvion/transcode-runner
            compatibility_tag: 0.1.0
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ github.sha }}
            ${{ matrix.image }}:${{ matrix.compatibility_tag }}

  go-lint:
    name: Lint Go runners
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
      - name: Vet embed-runner
        run: cd embed-runner && go vet ./...
      - name: Vet transcode-runner
        run: cd transcode-runner && go vet ./...
