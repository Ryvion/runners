name: Build Runner Images

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: embed-runner
            context: ./embed-runner
            dockerfile: ./embed-runner/Dockerfile
            image: ghcr.io/ryvion/embed-runner
            platforms: linux/amd64
            tags: |
              ghcr.io/ryvion/embed-runner:latest
              ghcr.io/ryvion/embed-runner:${{ github.sha }}
              ghcr.io/ryvion/embed-runner:0.1.0
          - name: transcode-runner
            context: ./transcode-runner
            dockerfile: ./transcode-runner/Dockerfile
            image: ghcr.io/ryvion/transcode-runner
            platforms: linux/amd64,linux/arm64
            tags: |
              ghcr.io/ryvion/transcode-runner:latest
              ghcr.io/ryvion/transcode-runner:${{ github.sha }}
              ghcr.io/ryvion/transcode-runner:0.1.0
          - name: vllm-runner
            context: ./vllm-runner
            dockerfile: ./vllm-runner/Dockerfile
            image: ghcr.io/ryvion/vllm-runner
            platforms: linux/amd64
            tags: |
              ghcr.io/ryvion/vllm-runner:latest
              ghcr.io/ryvion/vllm-runner:${{ github.sha }}
              ghcr.io/ryvion/vllm-runner:deepseek-r1-671b
              ghcr.io/ryvion/vllm-runner:deepseek-v3-671b
              ghcr.io/ryvion/vllm-runner:llama-3_3-70b
              ghcr.io/ryvion/vllm-runner:qwen-2_5-72b
              ghcr.io/ryvion/vllm-runner:mistral-large-2
          - name: spatial-recon-runner
            context: ./spatial-stage-runner
            dockerfile: ./spatial-stage-runner/Dockerfile
            image: ghcr.io/ryvion/spatial-recon-runner
            build_args: STAGE_KIND=spatial_recon
            platforms: linux/amd64
            tags: |
              ghcr.io/ryvion/spatial-recon-runner:latest
              ghcr.io/ryvion/spatial-recon-runner:${{ github.sha }}
              ghcr.io/ryvion/spatial-recon-runner:0.1.0
          - name: pointcloud-align-runner
            context: ./spatial-stage-runner
            dockerfile: ./spatial-stage-runner/Dockerfile
            image: ghcr.io/ryvion/pointcloud-align-runner
            build_args: STAGE_KIND=pointcloud_align
            platforms: linux/amd64
            tags: |
              ghcr.io/ryvion/pointcloud-align-runner:latest
              ghcr.io/ryvion/pointcloud-align-runner:${{ github.sha }}
              ghcr.io/ryvion/pointcloud-align-runner:0.1.0
          - name: mesh-optimize-runner
            context: ./spatial-stage-runner
            dockerfile: ./spatial-stage-runner/Dockerfile
            image: ghcr.io/ryvion/mesh-optimize-runner
            build_args: STAGE_KIND=mesh_optimize
            platforms: linux/amd64
            tags: |
              ghcr.io/ryvion/mesh-optimize-runner:latest
              ghcr.io/ryvion/mesh-optimize-runner:${{ github.sha }}
              ghcr.io/ryvion/mesh-optimize-runner:0.1.0
          - name: scene-render-runner
            context: ./spatial-stage-runner
            dockerfile: ./spatial-stage-runner/Dockerfile
            image: ghcr.io/ryvion/scene-render-runner
            build_args: STAGE_KIND=scene_render
            platforms: linux/amd64
            tags: |
              ghcr.io/ryvion/scene-render-runner:latest
              ghcr.io/ryvion/scene-render-runner:${{ github.sha }}
              ghcr.io/ryvion/scene-render-runner:0.1.0
          - name: image-gen-runner
            context: ./image-gen-runner
            dockerfile: ./image-gen-runner/Dockerfile
            image: ghcr.io/ryvion/image-gen-runner
            platforms: linux/amd64
            tags: |
              ghcr.io/ryvion/image-gen-runner:latest
              ghcr.io/ryvion/image-gen-runner:${{ github.sha }}
              ghcr.io/ryvion/image-gen-runner:0.1.0
          - name: whisper-runner
            context: ./whisper-runner
            dockerfile: ./whisper-runner/Dockerfile
            image: ghcr.io/ryvion/whisper-runner
            platforms: linux/amd64
            tags: |
              ghcr.io/ryvion/whisper-runner:latest
              ghcr.io/ryvion/whisper-runner:${{ github.sha }}
              ghcr.io/ryvion/whisper-runner:0.1.0
          - name: model-runner
            context: ./model-runner
            dockerfile: ./model-runner/Dockerfile
            image: ghcr.io/ryvion/model-runner
            platforms: linux/amd64
            tags: |
              ghcr.io/ryvion/model-runner:latest
              ghcr.io/ryvion/model-runner:${{ github.sha }}
              ghcr.io/ryvion/model-runner:0.1.0
          - name: finetune-runner
            context: ./finetune-runner
            dockerfile: ./finetune-runner/Dockerfile
            image: ghcr.io/ryvion/finetune-runner
            platforms: linux/amd64
            tags: |
              ghcr.io/ryvion/finetune-runner:latest
              ghcr.io/ryvion/finetune-runner:${{ github.sha }}
              ghcr.io/ryvion/finetune-runner:0.1.0
          - name: agent-runner
            context: ./agent-runner
            dockerfile: ./agent-runner/Dockerfile
            image: ghcr.io/ryvion/agent-runner
            platforms: linux/amd64,linux/arm64
            tags: |
              ghcr.io/ryvion/agent-runner:latest
              ghcr.io/ryvion/agent-runner:${{ github.sha }}
              ghcr.io/ryvion/agent-runner:0.1.0
          - name: bitnet-runner
            context: ./bitnet-runner
            dockerfile: ./bitnet-runner/Dockerfile
            image: ghcr.io/ryvion/bitnet-runner
            platforms: linux/amd64
            tags: |
              ghcr.io/ryvion/bitnet-runner:latest
              ghcr.io/ryvion/bitnet-runner:${{ github.sha }}
              ghcr.io/ryvion/bitnet-runner:0.1.0
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Free disk space for heavyweight images
        if: contains(fromJSON('["vllm-runner","image-gen-runner","whisper-runner","model-runner","finetune-runner","bitnet-runner"]'), matrix.name)
        run: |
          echo "Before cleanup:"
          df -h
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          docker system prune -af || true
          echo "After cleanup:"
          df -h

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platforms }}
          push: ${{ github.event_name != 'pull_request' }}
          build-args: ${{ matrix.build_args }}
          provenance: false
          sbom: false
          tags: ${{ matrix.tags }}

  go-lint:
    name: Lint runners
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
      - name: Vet embed-runner
        run: cd embed-runner && go vet ./...
      - name: Vet transcode-runner
        run: cd transcode-runner && go vet ./...
      - name: Check spatial-stage-runner syntax
        run: python -m py_compile spatial-stage-runner/run.py
      - name: Check vllm-runner syntax
        run: python -m py_compile vllm-runner/run.py
      - name: Check image-gen-runner syntax
        run: python -m py_compile image-gen-runner/run.py
      - name: Check whisper-runner syntax
        run: python -m py_compile whisper-runner/run.py
      - name: Check model-runner syntax
        run: python -m py_compile model-runner/run.py
      - name: Check finetune-runner syntax
        run: python -m py_compile finetune-runner/train.py
      - name: Check agent-runner syntax
        run: python -m py_compile agent-runner/run.py
